<!-- src/app/components/transaction/transaction-create/transaction-create.component.html -->
<div class="container mt-4">
	<h2>Создание транзакции</h2>
	<form [formGroup]="transactionForm" (ngSubmit)="createTransaction()" class="mt-3">
		<!-- Талон очереди -->
		<div class="mb-3">
			<label for="token" class="form-label">Талон очереди:</label>
			<input id="token" type="text" formControlName="token" class="form-control" required>
		</div>

		<!-- Контрагент -->
		<div class="mb-3">
			<label for="contractor" class="form-label">Контрагент:</label>
			<select formControlName="contractorId" id="contractor" class="form-control" required>
				<option value="" disabled selected>Выберите контрагента</option>
				<option *ngFor="let c of contractors" [value]="c.id">
					{{ c.lastName }} {{ c.firstName }}
				</option>
			</select>
		</div>

		<!-- Торговая точка -->
		<div class="mb-3">
			<label for="store" class="form-label">Торговая точка:</label>
			<select formControlName="storeId" id="store" class="form-control" required>
				<option value="" disabled selected>Выберите торговую точку</option>
				<option *ngFor="let s of stores" [value]="s.id">
					{{ s.building }} №{{ s.storeNumber }}
				</option>
			</select>
		</div>

		<!-- Тип пропуска -->
		<div class="mb-3">
			<label for="passType" class="form-label">Тип пропуска:</label>
			<select formControlName="passTypeId" id="passType" class="form-control" required>
				<option value="" disabled selected>Выберите тип пропуска</option>
				<option *ngFor="let pt of passTypes" [value]="pt.id">
					{{ pt.name }}
				</option>
			</select>
		</div>

		<!-- Дата начала -->
		<div class="mb-3">
			<label for="startDate" class="form-label">Дата начала:</label>
			<input id="startDate" type="date" formControlName="startDate" class="form-control" required>
		</div>

		<!-- Дата окончания -->
		<div class="mb-3">
			<label for="endDate" class="form-label">Дата окончания:</label>
			<input id="endDate" type="date" formControlName="endDate" class="form-control" required>
		</div>

		<!-- Должность -->
		<div class="mb-3">
			<label for="position" class="form-label">Должность:</label>
			<input id="position" type="text" formControlName="position" class="form-control" required>
		</div>

		<button type="submit" class="btn btn-primary" [disabled]="transactionForm.invalid">
			Создать
		</button>
	</form>
</div>
