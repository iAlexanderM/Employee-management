<div class="container">
	<h2>Создание новой группы пропусков</h2>
	<form (ngSubmit)="createGroup()">
		<div class="form-group">
			<label for="name">Название</label>
			<input id="name" type="text" class="form-control" [(ngModel)]="group.name" name="name" required />
		</div>

		<div class="form-group">
			<label for="color">Цвет</label>
			<input id="color" type="color" class="form-control" [(ngModel)]="group.color" name="color" />
		</div>

		<button type="submit" class="btn btn-primary">Создать</button>
		<button type="button" class="btn btn-secondary" routerLink="/pass-groups">Отмена</button>
	</form>
</div>
