<div class="container">
	<h2>Добавить запись в справочник "Точки"</h2>

	<!-- Блок отображения ошибки -->
	<div *ngIf="errorMessage" class="error-message">
		<p>{{ errorMessage }}</p>
	</div>

	<!-- Форма добавления -->
	<form (ngSubmit)="addStoreNumber()">
		<div class="form-group">
			<label for="storeNumberName">Название точки:</label>
			<div class="input-container">
				<input id="storeNumberName" type="text" placeholder="Введите название здания"
					[(ngModel)]="newStoreNumberName" name="storeNumberName" required />
			</div>
		</div>
		<button type="submit" class="btn btn-primary">Добавить</button>
	</form>
</div>
