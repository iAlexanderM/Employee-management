<div *ngIf="floor" class="container">
	<h2>Редактирование записи №{{ floor.id }}</h2>

	<!-- Блок отображения ошибки -->
	<div *ngIf="errorMessage" class="error-message">
		<p>{{ errorMessage }}</p>
	</div>

	<!-- Форма редактирования -->
	<form (ngSubmit)="updateFloor()">
		<div class="form-group">
			<label for="floorName">Название:</label>
			<div class="input-container">
				<input id="floorName" type="text" placeholder="Введите название этажа" [(ngModel)]="updatedFloorName"
					name="floorName" required />
			</div>
		</div>

		<div class="form-group">
			<label for="sortOrder">Сортировка:</label>
			<div class="input-container">
				<input id="sortOrder" type="number" placeholder="Введите порядок сортировки"
					[(ngModel)]="updatedSortOrder" name="sortOrder" required />
			</div>
		</div>

		<button type="submit" class="btn btn-primary">Сохранить</button>
	</form>
</div>
