<div class="compact-container talons-container">
	<h2>Список талонов</h2>
	<!-- Форма для создания талона -->
	<form [formGroup]="createTokenForm" (ngSubmit)="onCreateToken()">
		<label for="tokenType">Тип талона:</label>
		<select formControlName="type" id="tokenType" class="form-select">
			<option value="P">P</option>
			<option value="G">G</option>
		</select>
		<button type="submit" class="btn btn-primary">
			Создать талон
		</button>
	</form>
	<br>
	<!-- Таблица талонов -->
	<table class="table table-bordered table-striped">
		<thead>
			<tr>
				<th>ID</th>
				<th>Дата</th>
				<th>Талон</th>
				<th>Тип</th>
				<th>Статус</th>
				<th>Пользователь</th>
				<th>Действия</th>
			</tr>
		</thead>
		<tbody>
			<tr *ngFor="let t of tokens">
				<td>{{ t.id }}</td>
				<td>{{ t.createdAt | date:'dd.MM.yyyy HH:mm:ss' }}</td>
				<td>{{ t.token }}</td>
				<td>{{ t.tokenType }}</td>
				<td>{{ t.status }}</td>
				<td>{{ t.userId }}</td>
				<td>
					<button *ngIf="t.status === 'Active'" class="btn btn-danger btn-sm" (click)="onCloseToken(t.token)">
						Закрыть
					</button>
				</td>
			</tr>
		</tbody>
	</table>
</div>
