<div>
	<h2>Список зданий</h2>
	<button (click)="addNationality()" class="btn btn-info btn-sm btn-equal">Добавить новую национальность</button>
	<br>
	<button type="button" class="btn btn-link mb-3" (click)="toggleSearchForm()">
		{{ isExpanded ? 'Свернуть' : 'Развернуть' }} форму поиска
	</button>

	<form *ngIf="isExpanded" [formGroup]="searchForm" (ngSubmit)="searchNationalities()" class="mb-4">
		<div class="row">
			<div class="col-md-4">
				<label for="Id">ID национальности</label>
				<input id="Id" formControlName="Id" type="text" class="form-control" />
			</div>

			<div class="col-md-4">
				<label for="Name">Название:</label>
				<input id="Name" formControlName="Name" type="text" class="form-control" />
			</div>
		</div>

		<div class="row mt-4">
			<div class="col-md-12 text-right">
				<button type="submit" class="btn btn-primary">Найти</button>
				<button type="button" class="btn btn-secondary" (click)="resetFilters()">Сбросить</button>
			</div>
		</div>
	</form>

	<div class="d-flex justify-content-between align-items-center mb-3">
		<div>
			<label for="pageSize">Элементов на странице:</label>
			<select id="pageSize" class="form-control w-auto d-inline-block" [(ngModel)]="pageSize"
				(change)="onPageSizeChange()">
				<option *ngFor="let size of pageSizeOptions" [value]="size">{{ size }}</option>
			</select>
		</div>
		<p>Всего страниц: {{ totalPages }}</p>
	</div>

	<!-- Пагинация -->
	<div *ngIf="totalPages > 1" class="pagination-container">
		<div class="pagination-squares">
			<div *ngFor="let page of visiblePages" class="square" [class.active]="page === currentPage"
				[class.disabled]="page === '...'" (click)="onPageClick(page)">
				{{ page }}
			</div>
		</div>
	</div>
	<br>

	<table class="table table-bordered table-hover" *ngIf="displayedNationalities.length > 0">
		<thead>
			<tr>
				<th>Сортировка</th>
				<th>ID</th>
				<th>Название</th>
				<th>Действия</th>
			</tr>
		</thead>
		<tbody>
			<tr *ngFor="let nationality of displayedNationalities">
				<td>{{ nationality.sortOrder }}</td>
				<td>{{ nationality.id }}</td>
				<td>{{ nationality.name }}</td>
				<td>
					<button class="btn btn-info btn-sm btn-equal"
						(click)="viewNationalityDetailsInNewTab(nationality.id)">Просмотреть</button>
					<button class="btn btn-secondary btn-sm btn-equal"
						(click)="editNationality(nationality.id)">Редактировать</button>
				</td>
			</tr>
		</tbody>
	</table>

	<p *ngIf="displayedNationalities.length === 0">Нет записей для отображения.</p>

	<!-- Пагинация -->
	<div *ngIf="totalPages > 1" class="pagination-container">
		<div class="pagination-squares">
			<div *ngFor="let page of visiblePages" class="square" [class.active]="page === currentPage"
				[class.disabled]="page === '...'" (click)="onPageClick(page)">
				{{ page }}
			</div>
		</div>
	</div>
</div>
