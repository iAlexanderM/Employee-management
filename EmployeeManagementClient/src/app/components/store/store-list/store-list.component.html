<h2>Список торговых точек</h2>
<div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
<table>
	<thead>
		<tr>
			<th>ID</th>
			<th>Здание</th>
			<th>Этаж</th>
			<th>Линия</th>
			<th>Номер</th>
			<th>Действия</th>
		</tr>
	</thead>
	<tbody>
		<tr *ngFor="let store of stores">
			<td>{{ store.id }}</td>
			<td>{{ store.building }}</td>
			<td>{{ store.floor }}</td>
			<td>{{ store.line }}</td>
			<td>{{ store.number }}</td>
			<td>
				<button (click)="archiveStore(store.id)">Архивировать</button>
			</td>
		</tr>
	</tbody>
</table>
