<div class="container">
	<h2>Список торговых точек</h2>
	<table class="table table-bordered">
		<thead>
			<tr>
				<th>Здание</th>
				<th>Этаж</th>
				<th>Линия</th>
				<th>Номер торговой точки</th>
				<th>Действия</th>
			</tr>
		</thead>
		<tbody>
			<tr *ngFor="let store of stores">
				<td>{{ store.building }}</td>
				<td>{{ store.floor }}</td>
				<td>{{ store.line }}</td>
				<td>{{ store.storeNumber }}</td>
				<td>
					<a [routerLink]="['/stores/details', store.id]" class="btn btn-info">Просмотр</a>
					<a [routerLink]="['/stores/edit', store.id]" class="btn btn-warning">Редактировать</a>
				</td>
			</tr>
		</tbody>
	</table>
	<a routerLink="/stores/new" class="btn btn-success">Добавить торговую точку</a>
</div>
