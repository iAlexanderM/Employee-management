<h2>{{ isEditMode ? 'Редактировать контрагента' : 'Добавить нового контрагента' }}</h2>

<form [formGroup]="contractorForm" (ngSubmit)="onSubmit()">
	<!-- Поле для имени -->
	<div class="form-group">
		<label for="firstName">Имя</label>
		<input id="firstName" formControlName="firstName" class="form-control" required>
	</div>

	<!-- Поле для фамилии -->
	<div class="form-group">
		<label for="lastName">Фамилия</label>
		<input id="lastName" formControlName="lastName" class="form-control" required>
	</div>

	<!-- Поле для отчества -->
	<div class="form-group">
		<label for="middleName">Отчество</label>
		<input id="middleName" formControlName="middleName" class="form-control">
	</div>

	<!-- Поле для даты рождения с типом date -->
	<div class="form-group">
		<label for="birthDate">Дата Рождения</label>
		<input id="birthDate" formControlName="birthDate" type="date" class="form-control" required>
	</div>

	<!-- Поле для типа документа -->
	<div class="form-group">
		<label for="documentType">Тип Документа</label>
		<input id="documentType" formControlName="documentType" class="form-control" required>
	</div>

	<!-- Поле для серии и номера паспорта -->
	<div class="form-group">
		<label for="passportSerialNumber">Серия и номер паспорта</label>
		<input id="passportSerialNumber" formControlName="passportSerialNumber" class="form-control">
	</div>

	<!-- Поле для кем выдан паспорт -->
	<div class="form-group">
		<label for="passportIssuedBy">Кем выдан паспорт</label>
		<input id="passportIssuedBy" formControlName="passportIssuedBy" class="form-control" required>
	</div>

	<!-- Поле для даты выдачи паспорта с типом date -->
	<div class="form-group">
		<label for="passportIssueDate">Дата выдачи паспорта</label>
		<input id="passportIssueDate" formControlName="passportIssueDate" type="date" class="form-control" required>
	</div>

	<!-- Поле для типа продукции -->
	<div class="form-group">
		<label for="productType">Тип продукции</label>
		<input id="productType" formControlName="productType" class="form-control" required>
	</div>

	<!-- Поле для загрузки фото -->
	<div class="form-group">
		<label for="photo">Фото</label>
		<input id="photo" type="file" (change)="onPhotoChange($event)" class="form-control" />
	</div>

	<!-- Поле для загрузки фото документов (множественный выбор) -->
	<div class="form-group">
		<label for="documentPhotos">Фото документов</label>
		<input id="documentPhotos" type="file" (change)="onDocumentPhotosChange($event)" multiple
			class="form-control" />
	</div>

	<button type="submit" class="btn btn-primary">{{ isEditMode ? 'Сохранить изменения' : 'Добавить контрагента'
		}}</button>
</form>
