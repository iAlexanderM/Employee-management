<div class="container">
	<h2>Список контрагентов</h2>

	<!-- Таблица с контрагентами -->
	<table class="table table-bordered" *ngIf="contractors && contractors.length > 0">
		<thead>
			<tr>
				<th>Имя</th>
				<th>Фамилия</th>
				<th>Отчество</th>
				<th>Дата рождения</th>
				<th>Фото</th>
				<th>Действия</th>
			</tr>
		</thead>
		<tbody>
			<tr *ngFor="let contractor of contractors">
				<td>{{ contractor.firstName }}</td>
				<td>{{ contractor.lastName }}</td>
				<td>{{ contractor.middleName }}</td>
				<td>{{ contractor.birthDate | date: 'dd.MM.yyyy' }}</td>
				<td>
					<img *ngIf="getFirstPhoto(contractor)" [src]="getFirstPhoto(contractor)" alt="Фото контрагента"
						style="width: 50px; height: 50px; object-fit: cover;">
				</td>
				<td>
					<a [routerLink]="['/contractors/details', contractor.id]" class="btn btn-info">Просмотр</a>
					<a [routerLink]="['/contractors/edit', contractor.id]" class="btn btn-warning">Редактировать</a>
				</td>
			</tr>
		</tbody>
	</table>

	<!-- Сообщение, если контрагентов нет -->
	<p *ngIf="contractors && contractors.length === 0">Нет контрагентов для отображения.</p>

	<!-- Кнопка для добавления нового контрагента -->
	<a routerLink="/contractors/new" class="btn btn-success">Добавить контрагента</a>
</div>
