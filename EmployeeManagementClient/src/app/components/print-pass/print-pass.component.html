<div class="container mt-4">
	<h2>Печать пропусков</h2>
	<table class="table table-bordered mt-3">
		<thead class="table-light">
			<tr>
				<th>ID</th>
				<th>Имя</th>
				<th>Фамилия</th>
				<th>Действия</th>
			</tr>
		</thead>
		<tbody>
			<tr *ngFor="let contractor of contractors">
				<td>{{ contractor.id }}</td>
				<td>{{ contractor.firstName }}</td>
				<td>{{ contractor.lastName }}</td>
				<td>
					<button class="btn btn-success btn-sm" (click)="printPass(contractor)">Печать пропуска</button>
				</td>
			</tr>
		</tbody>
	</table>
</div>
