<h2>Печать пропусков</h2>
<table class="table">
	<thead>
		<tr>
			<th>ID</th>
			<th>Имя</th>
			<th>Фамилия</th>
			<th>Действия</th>
		</tr>
	</thead>
	<tbody>
		<tr *ngFor="let contractor of contractors">
			<td>{{ contractor.id }}</td>
			<td>{{ contractor.firstName }}</td>
			<td>{{ contractor.lastName }}</td>
			<td>
				<button class="btn btn-success" (click)="printPass(contractor)">Печать пропуска</button>
			</td>
		</tr>
	</tbody>
</table>
